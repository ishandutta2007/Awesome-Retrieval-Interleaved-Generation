<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="15"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="300" fill="url(#grid)" rx="15"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="80" r="120" fill="rgba(0,210,255,0.04)"/>
  <circle cx="1050" cy="220" r="140" fill="rgba(245,87,108,0.04)"/>

  <!-- Left decorative line -->
  <rect x="40" y="60" width="6" height="180" rx="3" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="80" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    Awesome Retrieval-Interleaved
  </text>
  <text x="80" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    Generation
  </text>

  <!-- Subtitle -->
  <text x="80" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">
    Evolution · Variants · Types · Applications
  </text>

  <!-- Badge pills -->
  <rect x="80" y="230" width="130" height="28" rx="14" fill="url(#accent)" opacity="0.8"/>
  <text x="145" y="249" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">RAG · RIG · AGENTS</text>

  <rect x="220" y="230" width="120" height="28" rx="14" fill="url(#accent2)" opacity="0.8"/>
  <text x="280" y="249" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">LLM · NLP · AI</text>

  <!-- Right side illustration: retrieval loop icon -->
  <g transform="translate(850, 50)">
    <!-- Arrows forming a loop -->
    <!-- Search icon -->
    <circle cx="150" cy="70" r="35" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <line x1="175" y1="95" x2="195" y2="115" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

    <!-- Document icon -->
    <rect x="210" y="45" width="40" height="50" rx="4" fill="none" stroke="url(#accent2)" stroke-width="2.5"/>
    <line x1="218" y1="58" x2="242" y2="58" stroke="url(#accent2)" stroke-width="2"/>
    <line x1="218" y1="68" x2="242" y2="68" stroke="url(#accent2)" stroke-width="2"/>
    <line x1="218" y1="78" x2="235" y2="78" stroke="url(#accent2)" stroke-width="2"/>

    <!-- LLM icon (brain/network dots) -->
    <circle cx="150" cy="160" r="8" fill="url(#accent)" opacity="0.6"/>
    <circle cx="170" cy="140" r="8" fill="url(#accent2)" opacity="0.6"/>
    <circle cx="190" cy="160" r="8" fill="url(#accent)" opacity="0.6"/>
    <circle cx="210" cy="140" r="8" fill="url(#accent2)" opacity="0.6"/>
    <circle cx="230" cy="160" r="8" fill="url(#accent)" opacity="0.6"/>
    <line x1="150" y1="160" x2="170" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="170" y1="140" x2="190" y2="160" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="190" y1="160" x2="210" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="210" y1="140" x2="230" y2="160" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

    <!-- Arrow from search to doc -->
    <path d="M 195 80 Q 210 50 210 45" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" marker-end="none"/>
    <polygon points="210,45 205,53 215,53" fill="rgba(255,255,255,0.4)"/>

    <!-- Arrow from doc to LLM -->
    <path d="M 230 95 Q 250 130 230 140" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <polygon points="230,140 225,132 220,142" fill="rgba(255,255,255,0.4)"/>

    <!-- Arrow from LLM to search -->
    <path d="M 170 160 Q 100 150 100 120" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="100,120 108,115 97,112" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="40" y="270" width="1120" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>
</svg>
